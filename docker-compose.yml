version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: scalable-api-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    container_name: scalable-api-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/scalable_api
      JWT_SECRET: replace_with_production_secret
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:8080
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
    container_name: scalable-api-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mongo_data:
